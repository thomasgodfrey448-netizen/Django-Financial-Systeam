{% extends 'base.html' %}
{% block title %}Manage User{% endblock %}

{% block content %}
<div class="page-wrapper">
    <div class="page-header">
        <div class="container-fluid">
            <div class="row align-items-center">
                <div class="col">
                    <h1 class="page-title"><i class="fas fa-user-edit me-2"></i>Manage User</h1>
                    <p class="page-subtitle">Edit user profile and permissions</p>
                </div>
                <div class="col-auto">
                    <a href="{% url 'admin_dashboard' %}" class="btn btn-outline-light">
                        <i class="fas fa-arrow-left me-1"></i> Back
                    </a>
                </div>
            </div>
        </div>
    </div>
    <div class="container-fluid py-4">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="form-card">
                    <div class="form-card-header"><i class="fas fa-user me-2"></i>User: {{ user_obj.username }}</div>
                    <div class="form-card-body">
                        <form method="post">
                            {% csrf_token %}
                            <div class="row g-3">
                                <div class="col-6">
                                    <label class="form-label fw-500">First Name</label>
                                    <input type="text" name="first_name" class="form-control"
                                           value="{{ form.initial.first_name|default:user_obj.first_name }}">
                                </div>
                                <div class="col-6">
                                    <label class="form-label fw-500">Last Name</label>
                                    <input type="text" name="last_name" class="form-control"
                                           value="{{ form.initial.last_name|default:user_obj.last_name }}">
                                </div>
                                <div class="col-12">
                                    <label class="form-label fw-500">Email</label>
                                    <input type="email" name="email" class="form-control"
                                           value="{{ form.initial.email|default:user_obj.email }}">
                                </div>
                                <div class="col-6">
                                    <label class="form-label fw-500">Role</label>
                                    <select name="role" class="form-select">
                                        <option value="user" {% if form.instance.role == 'user' %}selected{% endif %}>User</option>
                                        <option value="admin" {% if form.instance.role == 'admin' %}selected{% endif %}>Admin</option>
                                    </select>
                                </div>
                                <div class="col-6">
                                    <label class="form-label fw-500">Phone</label>
                                    <input type="text" name="phone" class="form-control"
                                           value="{{ form.instance.phone }}">
                                </div>

                            </div>
                            <div class="d-flex gap-3 mt-4">
                                <button type="submit" class="btn btn-primary btn-lg flex-fill">
                                    <i class="fas fa-save me-2"></i> Save Changes
                                </button>
                                <a href="{% url 'admin_dashboard' %}" class="btn btn-outline-secondary btn-lg">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
